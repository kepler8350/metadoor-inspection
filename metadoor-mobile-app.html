<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타도어 점검 앱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }
    
    .mobile-frame {
      width: 100%;
      max-width: 375px;
      height: 812px;
      background: white;
      border-radius: 40px;
      border: 12px solid #000;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .notch {
      background: #000;
      height: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 11px;
      color: white;
    }
    
    .status-bar {
      background: #000;
      color: white;
      padding: 4px 16px;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 24px;
    }
    
    .app-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      overflow: hidden;
      position: relative;
    }
    
    .screen {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    
    .screen.active {
      display: flex;
    }
    
    /* ===== 로그인 화면 ===== */
    .login-screen {
      background: linear-gradient(135deg, #1e5a96 0%, #164a7a 100%);
      padding: 0;
      justify-content: center;
      align-items: center;
    }
    
    .login-container {
      text-align: center;
      padding: 40px 24px;
      width: 100%;
    }
    
    .logo {
      font-size: 56px;
      margin-bottom: 16px;
    }
    
    .title {
      font-size: 28px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 32px;
    }
    
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    
    .input-group {
      margin-bottom: 16px;
    }
    
    .label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      text-align: left;
    }
    
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: #fafafa;
    }
    
    input:focus {
      outline: none;
      border-color: #1e5a96;
      background: white;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      margin-top: 4px;
    }
    
    .btn-primary {
      background: #1e5a96;
      color: white;
    }
    
    .btn-primary:active {
      background: #164a7a;
      transform: scale(0.98);
    }
    
    .help-text {
      font-size: 11px;
      color: #999;
      text-align: center;
      margin-top: 12px;
      line-height: 1.4;
    }
    
    /* ===== 구 선택 화면 ===== */
    .district-screen {
      flex-direction: row;
    }
    
    .header {
      background: #1e5a96;
      color: white;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 700;
      border-bottom: 1px solid #eee;
    }
    
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .left-panel {
      width: 40%;
      background: #f5f7fa;
      border-right: 1px solid #eee;
      overflow-y: auto;
      padding: 8px;
    }
    
    .right-panel {
      width: 60%;
      background: white;
      overflow-y: auto;
      padding: 12px 16px;
    }
    
    .district-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .district-btn {
      padding: 10px 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      font-family: inherit;
    }
    
    .district-btn:active {
      background: #f0f0f0;
    }
    
    .district-btn.selected {
      background: #1e5a96;
      color: white;
      border-color: #1e5a96;
    }
    
    .location-list {
      display: none;
    }
    
    .location-list.active {
      display: block;
    }
    
    .district-title {
      font-size: 13px;
      font-weight: 700;
      color: #1e5a96;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    
    .location-item {
      padding: 11px;
      background: white;
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1px solid #eee;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      transition: all 0.2s;
      font-family: inherit;
    }
    
    .location-item:active {
      background: #f0f0f0;
    }
    
    .location-name {
      font-weight: 600;
      margin-bottom: 3px;
    }
    
    .location-address {
      font-size: 11px;
      color: #999;
    }
    
    .no-selection {
      text-align: center;
      padding: 40px 16px;
      color: #999;
      font-size: 13px;
    }
    
    /* ===== 점검 화면 ===== */
    .inspection-screen {
      padding: 16px;
      overflow-y: auto;
    }
    
    .inspection-info {
      background: #1e5a96;
      color: white;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 14px;
      text-align: center;
    }
    
    .inspection-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 3px;
    }
    
    .inspection-step {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }
    
    .form-group {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    
    .form-title {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    
    select, textarea {
      width: 100%;
      padding: 9px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }
    
    textarea {
      resize: vertical;
      min-height: 70px;
    }
    
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }
    
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }
    
    ::-webkit-scrollbar {
      width: 4px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="mobile-frame">
    <div class="notch">9:41</div>
    
    <div class="status-bar">
      <span>📶</span>
      <span>🔋</span>
    </div>
    
    <div class="app-content">
      <!-- 로그인 화면 -->
      <div class="screen login-screen active">
        <div class="login-container">
          <div class="logo">🏛️</div>
          <div class="title">메타도어</div>
          <div class="subtitle">유지보수 점검 시스템</div>
          
          <div class="login-card">
            <div class="input-group">
              <label class="label">아이디</label>
              <input type="text" id="username" value="admin" placeholder="아이디">
            </div>
            
            <div class="input-group">
              <label class="label">비밀번호</label>
              <input type="password" id="password" value="admin123" placeholder="비밀번호">
            </div>
            
            <button class="btn btn-primary" onclick="handleLogin()">로그인</button>
            
            <div class="help-text">권한자가 등록한<br>직원만 로그인 가능합니다.</div>
          </div>
        </div>
      </div>
      
      <!-- 구 선택 화면 -->
      <div class="screen district-screen">
        <div class="header">구 선택</div>
        <div class="content-area">
          <div class="left-panel">
            <div class="district-list" id="district-list"></div>
          </div>
          <div class="right-panel">
            <div id="location-lists"></div>
            <div class="no-selection" id="no-selection">왼쪽에서 구를 선택하세요</div>
          </div>
        </div>
      </div>
      
      <!-- 점검 화면 -->
      <div class="screen inspection-screen">
        <div class="inspection-info">
          <div class="inspection-name" id="insp-name">사상구 - 삼락공원관리사무소</div>
          <div class="inspection-step">점검 입력 / 3단계</div>
        </div>
        
        <div class="form-group">
          <div class="form-title">점검 항목</div>
          <select id="insp-type">
            <option value="">-- 선택하세요 --</option>
            <option value="외벽">외벽</option>
            <option value="지붕">지붕</option>
            <option value="창호">창호</option>
            <option value="바닥">바닥</option>
            <option value="내벽">내벽</option>
            <option value="기타">기타</option>
          </select>
        </div>
        
        <div class="form-group">
          <div class="form-title">조사 내용</div>
          <textarea id="insp-content" placeholder="이상 발견 시 조사 내용 기록"></textarea>
        </div>
        
        <div class="form-group">
          <div class="form-title">점검 상태</div>
          <select id="insp-status">
            <option value="정상">✓ 정상</option>
            <option value="요주의">! 요주의</option>
            <option value="이상">✕ 이상</option>
          </select>
        </div>
        
        <div class="button-group">
          <button class="btn btn-secondary" onclick="handleSave()">임시 저장</button>
          <button class="btn btn-primary" onclick="handleSubmit()">완료</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const metadoorData = {
      '금정구': [
        { name: '금정도서관', address: '부산시 금정구 부곡동' },
        { name: '금정구청 신관', address: '부산시 금정구 중앙대로' },
        { name: '금정구 보건소', address: '부산시 금정구 장전동' }
      ],
      '기장군': [
        { name: '기장군청', address: '부산시 기장군 기장읍' },
        { name: '기장도서관', address: '부산시 기장군 정관면' },
        { name: '정관해변공원', address: '부산시 기장군 정관면' }
      ],
      '남구': [
        { name: '남구청', address: '부산시 남구 수로왕대로' },
        { name: '남부경찰서', address: '부산시 남구 용호동' },
        { name: '남구문화센터', address: '부산시 남구 대티로' }
      ],
      '동구': [
        { name: '동구청', address: '부산시 동구 중앙대로' },
        { name: '동부경찰서', address: '부산시 동구 초량동' },
        { name: '동구도서관', address: '부산시 동구 중앙대로' }
      ],
      '동래구': [
        { name: '동래구청', address: '부산시 동래구 명륜로' },
        { name: '동래도서관', address: '부산시 동래구 온천장로' },
        { name: '온천장아파트관리사무소', address: '부산시 동래구 온천동' }
      ],
      '부산진구': [
        { name: '부산진구청', address: '부산시 부산진구 중앙대로' },
        { name: '부산진구문화센터', address: '부산시 부산진구 서면로' },
        { name: '서면역사무소', address: '부산시 부산진구 중앙대로' }
      ],
      '북구': [
        { name: '북구청', address: '부산시 북구 낙동대로' },
        { name: '북구도서관', address: '부산시 북구 만평동' },
        { name: '북구보건소', address: '부산시 북구 대현동' }
      ],
      '사상구': [
        { name: '사상구청', address: '부산시 사상구 사상로' },
        { name: '사상도서관', address: '부산시 사상구 모라로' },
        { name: '삼락공원관리사무소', address: '부산시 사상구 삼락동' }
      ],
      '사하구': [
        { name: '사하구청', address: '부산시 사하구 을숙도대로' },
        { name: '감천문화마을센터', address: '부산시 사하구 감내로' },
        { name: '사하도서관', address: '부산시 사하구 신평로' }
      ],
      '서구': [
        { name: '서구청', address: '부산시 서구 서감로' },
        { name: '암남공원관리사무소', address: '부산시 서구 망양로' },
        { name: '서구문화센터', address: '부산시 서구 구덕로' }
      ],
      '수영구': [
        { name: '수영구청', address: '부산시 수영구 남천로' },
        { name: '수영도서관', address: '부산시 수영구 수영로' },
        { name: '수영해수욕장관리사무소', address: '부산시 수영구 광안리로' }
      ],
      '연제구': [
        { name: '연제구청', address: '부산시 연제구 중앙로' },
        { name: '연제도서관', address: '부산시 연제구 중앙대로' },
        { name: '연제구보건소', address: '부산시 연제구 거제로' }
      ],
      '영도구': [
        { name: '영도구청', address: '부산시 영도구 영도대로' },
        { name: '영도도서관', address: '부산시 영도구 절영로' },
        { name: '절영로역사관', address: '부산시 영도구 절영로' }
      ],
      '중구': [
        { name: '중구청', address: '부산시 중구 중앙대로' },
        { name: '해양박물관', address: '부산시 중구 신항로' },
        { name: '중구도서관', address: '부산시 중구 중앙대로' }
      ],
      '해운대구': [
        { name: '해운대구청', address: '부산시 해운대구 중앙대로' },
        { name: '해운대도서관', address: '부산시 해운대구 해운대로' },
        { name: '해운대해수욕장관리사무소', address: '부산시 해운대구 해운대로' }
      ]
    };
    
    function initDistricts() {
      const districtList = document.getElementById('district-list');
      const locationLists = document.getElementById('location-lists');
      
      Object.keys(metadoorData).forEach(district => {
        const btn = document.createElement('button');
        btn.className = 'district-btn';
        btn.textContent = district;
        btn.onclick = function() { selectDistrict(district, this); };
        districtList.appendChild(btn);
        
        const listDiv = document.createElement('div');
        listDiv.className = 'location-list';
        listDiv.id = 'list-' + district;
        
        const title = document.createElement('div');
        title.className = 'district-title';
        title.textContent = district;
        listDiv.appendChild(title);
        
        metadoorData[district].forEach(location => {
          const item = document.createElement('div');
          item.className = 'location-item';
          item.innerHTML = '<div class="location-name">' + location.name + '</div><div class="location-address">' + location.address + '</div>';
          item.onclick = function() { selectLocation(district, location); };
          listDiv.appendChild(item);
        });
        
        locationLists.appendChild(listDiv);
      });
    }
    
    function handleLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      if (username === 'admin' && password === 'admin123') {
        showScreen(1);
      } else {
        alert('아이디 또는 비밀번호가 올바르지 않습니다.');
      }
    }
    
    function selectDistrict(district, btn) {
      document.querySelectorAll('.district-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      
      document.querySelectorAll('.location-list').forEach(l => l.classList.remove('active'));
      document.getElementById('list-' + district).classList.add('active');
      document.getElementById('no-selection').style.display = 'none';
    }
    
    function selectLocation(district, location) {
      document.getElementById('insp-name').textContent = district + ' - ' + location.name;
      showScreen(2);
    }
    
    function showScreen(index) {
      const screens = document.querySelectorAll('.screen');
      screens.forEach(s => s.classList.remove('active'));
      screens[index].classList.add('active');
    }
    
    function handleSave() {
      alert('임시 저장되었습니다.');
    }
    
    function handleSubmit() {
      const type = document.getElementById('insp-type').value;
      if (!type) {
        alert('점검 항목을 선택하세요.');
        return;
      }
      alert('점검이 완료되었습니다!');
      showScreen(1);
    }
    
    initDistricts();
  </script>
</body>
</html>
