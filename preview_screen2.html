<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>화면 미리보기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e8e8e8;padding:8px}
#phone{width:375px;height:812px;background:#fff;border-radius:40px;border:12px solid #000;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.notch{background:#000;height:28px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px}
.statusbar{background:#000;height:24px;display:flex;justify-content:space-between;padding:0 12px;color:#fff;font-size:10px;align-items:center}
.page{flex:1;display:none;flex-direction:column;overflow:hidden}
.page.show{display:flex}
.header{background:linear-gradient(135deg,#1e5a96,#154a7a);color:#fff;padding:12px 16px;font-size:14px;font-weight:700;border-bottom:1px solid #0d3a5c}
.step-info{font-size:10px;opacity:0.8;margin-top:2px}
.grid-container{flex:1;display:grid;grid-template-columns:45% 55%;overflow:hidden}
.left-panel{background:#f5f5f5;border-right:1px solid #ddd;overflow-y:auto;padding:10px}
.right-panel{background:#fff;overflow-y:auto;padding:18px;display:flex;align-items:center;justify-content:center;text-align:center;color:#888;font-size:13px}
.district-btn{width:100%;padding:10px;background:#fff;border:1px solid #ddd;border-radius:6px;margin-bottom:5px;font-size:13px;cursor:pointer;font-weight:500}
.district-btn.active{background:#1e5a96;color:#fff;border-color:#1e5a96}
</style>
</head>
<body>
<div id="phone">
<div class="notch">9:41</div>
<div class="statusbar"><span>📶</span><span>🔋</span></div>
<div class="page show">
<div class="header">
검결과 위치 선택
<div class="step-info">2단계 / 3단계</div>
</div>
<div class="grid-container">
<div class="left-panel">
<button class="district-btn">금정구</button>
<button class="district-btn">기장군</button>
<button class="district-btn">남구</button>
<button class="district-btn">동구</button>
<button class="district-btn">동래구</button>
<button class="district-btn">부산진구</button>
<button class="district-btn">북구</button>
<button class="district-btn">사상구</button>
<button class="district-btn">사하구</button>
<button class="district-btn">서구</button>
<button class="district-btn">수영구</button>
<button class="district-btn">연제구</button>
<button class="district-btn">영도구</button>
<button class="district-btn">중구</button>
</div>
<div class="right-panel">
선택하세요
</div>
</div>
</div>
</div>
</body>
</html>
