<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타도어 점검</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app" class="app-container">
        <!-- 로그인 화면 -->
        <div id="loginScreen" class="screen active">
            <div class="login-card">
                <div class="app-header">
                    <div class="app-icon">🏛️</div>
                    <h1>메타도어</h1>
                    <p>유지보수 점검 시스템</p>
                </div>
                
                <form id="loginForm" class="form-group">
                    <div class="form-field">
                        <label>아이디</label>
                        <input type="text" id="userId" placeholder="아이디" required>
                    </div>
                    
                    <div class="form-field">
                        <label>비밀번호</label>
                        <input type="password" id="userPassword" placeholder="비밀번호" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">로그인</button>
                    
                    <p class="help-text">권한자가 등록한 직원만 로그인할 수 있습니다.</p>
                </form>
            </div>
        </body>

        <!-- 점검 위치 선택 화면 -->
        <div id="selectDistrictScreen" class="screen">
            <div class="screen-header">
                <button class="btn-back" onclick="goBack()">←</button>
                <h2>점검 위치 선택</h2>
                <button class="btn-logout" onclick="logout()">로그아웃</button>
            </div>
            
            <div class="district-selection">
                <div class="selection-header">
                    <label>구</label>
                    <p class="selection-hint">선택해주세요</p>
                </div>
                
                <div id="districtList" class="button-list">
                    <!-- 동적으로 로드됨 -->
                </div>
            </div>
        </div>

        <!-- 점검 항목 입력 화면 -->
        <div id="inspectionScreen" class="screen">
            <div class="screen-header">
                <button class="btn-back" onclick="goBack()">←</button>
                <h2>점검 항목 입력</h2>
            </div>
            
            <form id="inspectionForm" class="form-group">
                <div class="form-section">
                    <label>선택된 지역</label>
                    <div class="info-box" id="selectedDistrict"></div>
                </div>

                <div class="form-section">
                    <label>점검 항목</label>
                    <select id="inspectionItem" required>
                        <option value="">-- 항목 선택 --</option>
                        <option value="door_check">도어 점검</option>
                        <option value="lock_check">잠금장치 점검</option>
                        <option value="hinge_check">경첩 점검</option>
                        <option value="surface_check">표면 손상 점검</option>
                        <option value="operation_check">작동 확인</option>
                    </select>
                </div>

                <div class="form-section">
                    <label>조치 내용</label>
                    <p class="example-text">예: 페널 변인 → 조기화 완료</p>
                    <textarea id="actionDetail" placeholder="조치 내용을 입력하세요" rows="4"></textarea>
                </div>

                <div class="form-section">
                    <label>서명</label>
                    <div id="signatureArea" class="signature-area">
                        <canvas id="signatureCanvas" width="300" height="150"></canvas>
                        <div class="signature-buttons">
                            <button type="button" class="btn btn-secondary" onclick="clearSignature()">지우기</button>
                            <button type="button" class="btn btn-secondary" onclick="saveInspection()">저장</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <!-- 완료 화면 -->
        <div id="completeScreen" class="screen">
            <div class="complete-message">
                <div class="success-icon">✓</div>
                <h2>점검이 완료되었습니다</h2>
                <p id="completeDetails"></p>
                <button class="btn btn-primary" onclick="goToHome()">처음으로</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
